config-version: 2

name: "dbt_exemplar"
version: "3.0.0"
require-dbt-version: ">=1.5.0"

dbt-cloud:
  project-id: 275557 # Put your project id here

profile: default # Put your profile here

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["data-tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  "dbt_date:time_zone": "Europe/London"

# seeds:

models:
  +transient: false
  dbt_exemplar:
    demos:
      HE:
        +database: | 
          {%- if target.name == "Prod" -%} HE_DEMO
          {%- else -%} "{{target.database}}"
          {%- endif -%}
        +quoting:
            database: false
            schema: false
            identifier: false

        staging:
          +materialized: view
          +schema: staging

        intermediate:
          +materialized: view
          +schema: intermediate

        marts:
          +materialized: table
          +schema: HE_PROD

    jaffle-shop:
      staging:
        +materialized: view
      marts:
        +materialized: table

    
flags:
  require_generic_test_arguments_property: true
