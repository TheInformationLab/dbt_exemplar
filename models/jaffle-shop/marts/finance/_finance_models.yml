models:
  - name: order_items
    description: "Item level overview data mart, offering classification flags and cost and revenue. One row per item per order. Items contained in each order. The grain of the table is one row per order item.\n"
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: order_item
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('orders')
                field: order_id
        entity:
          type: foreign
      - name: product_id
        entity:
          type: foreign
          name: product
      - name: ordered_at
        dimension:
          type: time
        granularity: day
      - name: is_food_item
        dimension:
          type: categorical
      - name: is_drink_item
        dimension:
          type: categorical
    semantic_model:
      enabled: true
      name: order_items
    agg_time_dimension: ordered_at
    metrics:
      - name: revenue
        description: Sum of the product revenue for each order item. Excludes tax.
        type: simple
        label: Revenue
        agg: sum
        expr: product_price
      - name: median_revenue
        description: The median revenue for each order item. Excludes tax.
        type: simple
        label: Median Revenue
        agg: median
        expr: product_price
      - name: food_revenue
        description: The revenue from food in each order.
        label: Food Revenue
        type: simple
        agg: sum
        expr: case when is_food_item then product_price else 0 end
      - name: drink_revenue
        description: The revenue from drinks in each order.
        label: Drink Revenue
        type: simple
        agg: sum
        expr: case when is_drink_item then product_price else 0 end
      - name: food_revenue_pct
        description: The % of order revenue from food.
        label: Food Revenue %
        type: ratio
        numerator: food_revenue
        denominator: revenue
      - name: drink_revenue_pct
        description: The % of order revenue from drinks.
        label: Drink Revenue %
        type: ratio
        numerator: drink_revenue
        denominator: revenue
      - name: revenue_growth_mom
        description: "Percentage growth of revenue compared to 1 month ago. Excludes tax."
        type: derived
        label: Revenue Growth % M/M
        expr: (current_revenue - revenue_prev_month)*100/revenue_prev_month
        input_metrics:
          - name: revenue
            alias: current_revenue
          - name: revenue
            offset_window: 1 month
            alias: revenue_prev_month
  - name: orders
    description: "Order overview data mart, offering key details for each order including if it's a customer's first order and a food vs. drink item breakdown. One row per order. Order fact table. This table is at the order grain with one row per order.\n"
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_items_subtotal = subtotal"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_total = subtotal + tax_paid"
    columns:
      - name: order_id
        description: The unique key of the orders mart.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
      - name: customer_id
        description: The foreign key relating to the customer who placed the order.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
        entity:
          type: foreign
          name: customer
      - name: order_total
        description: The total amount of the order in USD including tax.
        dimension:
          type: categorical
          name: order_total_dim
      - name: ordered_at
        description: The timestamp the order was placed at.
        dimension:
          type: time
        granularity: day
      - name: order_cost
        description: The sum of supply expenses to fulfill the order.
      - name: is_food_order
        description: A boolean indicating if this order included any food items.
        dimension:
          type: categorical
      - name: is_drink_order
        description: A boolean indicating if this order included any drink items.
        dimension:
          type: categorical
      - name: location_id
        entity:
          type: foreign
          name: location
      - name: customer_order_number
        dimension:
          type: categorical
    semantic_model:
      enabled: true
      name: orders
    agg_time_dimension: ordered_at
    metrics:
      - name: order_cost
        description: Sum of cost for each order item.
        label: Order Cost
        type: simple
        agg: sum
      - name: order_total
        description: Sum of total order amount. Includes tax + revenue.
        type: simple
        label: Order Total
        agg: sum
      - name: new_customer_orders
        description: New customer's first order count.
        label: New Customers
        type: simple
        filter: |
          {{ Dimension('order_id__customer_order_number') }} = 1
        agg: sum
        expr: 1
      - name: large_orders
        description: Count of orders with order total over 20.
        type: simple
        label: Large Orders
        filter: |
          {{ Dimension('order_id__order_total_dim') }} >= 20
        agg: sum
        expr: 1
      - name: orders
        description: Count of orders.
        label: Orders
        type: simple
        agg: sum
        expr: 1
      - name: food_orders
        description: Count of orders that contain food order items.
        label: Food Orders
        type: simple
        filter: |
          {{ Dimension('order_id__is_food_order') }} = true
        agg: sum
        expr: 1
      - name: drink_orders
        description: Count of orders that contain drink order items.
        label: Drink Orders
        type: simple
        filter: |
          {{ Dimension('order_id__is_drink_order') }} = true
        agg: sum
        expr: 1
      - name: tax_paid
        description: The total tax paid on each order.
        agg: sum
        type: simple
        hidden: true
unit_tests:
  - name: test_supply_costs_sum_correctly
    description: "Test that the counts of drinks and food orders convert to booleans properly."
    model: order_items
    given:
      - input: ref('stg_jaffle_shop__supplies')
        rows:
          - {product_id: 1, supply_cost: 4.50}
          - {product_id: 2, supply_cost: 3.50}
          - {product_id: 2, supply_cost: 5.00}
      - input: ref('stg_jaffle_shop__products')
        rows:
          - {product_id: 1}
          - {product_id: 2}
      - input: ref('stg_jaffle_shop__order_items')
        rows:
          - {order_id: 1, product_id: 1}
          - {order_id: 2, product_id: 2}
          - {order_id: 2, product_id: 2}
      - input: ref('stg_jaffle_shop__orders')
        rows:
          - {order_id: 1}
          - {order_id: 2}
    expect:
      rows:
        - {order_id: 1, product_id: 1, supply_cost: 4.50}
        - {order_id: 2, product_id: 2, supply_cost: 8.50}
        - {order_id: 2, product_id: 2, supply_cost: 8.50}

  - name: test_order_items_compute_to_bools_correctly
    description: "Test that the counts of drinks and food orders convert to booleans properly."
    model: orders
    given:
      - input: ref('order_items')
        rows:
          - {order_id: 1, order_item_id: 1, is_drink_item: false, is_food_item: true}
          - {order_id: 1, order_item_id: 2, is_drink_item: true, is_food_item: false}
          - {order_id: 2, order_item_id: 3, is_drink_item: false, is_food_item: true}
      - input: ref('stg_jaffle_shop__orders')
        rows:
          - {order_id: 1}
          - {order_id: 2}
    expect:
      rows:
        - {order_id: 1, count_food_items: 1, count_drink_items: 1, is_drink_order: true, is_food_order: true}
        - {order_id: 2, count_food_items: 1, count_drink_items: 0, is_drink_order: false, is_food_order: true}

metrics:
  # Simple metrics
  - name: order_gross_profit
    description: Gross profit from each order.
    type: derived
    label: Order Gross Profit
    expr: revenue - cost
    input_metrics:
      - name: revenue
      - name: order_cost
        alias: cost

  # Cumulative metrics

  # ------- Commented out 2026-06-01 due to OSI and dbt semantic drift. ----------
  # - name: cumulative_revenue
  #   description: The cumulative revenue for all orders.
  #   label: Cumulative Revenue (All Time)
  #   type: cumulative
  #   type_params:
  #     measure: revenue

saved_queries:
  - name: revenue_metrics
    query_params:
      metrics:
        - revenue
        - food_revenue
        - drink_revenue
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: revenue_metrics
        config:
          export_as: table

  - name: order_metrics
    query_params:
      metrics:
        - orders
        - new_customer_orders
        - order_total
        - food_orders
        - drink_orders
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: order_metrics
        config:
          export_as: table
