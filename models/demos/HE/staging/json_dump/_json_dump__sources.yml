version: 2

sources:
  - name: json_dump
    description: '{{ doc("he_source_json_dump") }}'
    database: HE_DEMO
    schema: RAW_JSON
    config:
      freshness: 
        warn_after: 
          count: 30
          period: day
        error_after: 
          count: 90
          period: day
      loaded_at_field: convert_timezone('UTC', 'UTC', __loaded_at)::timestamp_tz


    tables:
      - name: applications_raw
        description: '{{ doc("he_source_json_dump_table_applications_raw") }}'
        columns:
          - name: raw_json
            description: '{{ doc("he_col_raw_application_json") }}'
            data_tests:
              - not_null
          - name: __loaded_at
            description: '{{ doc("he_col__loaded_at")}}'
            data_tests:
              - not_null

      - name: lms_events_raw
        description: '{{ doc("he_source_json_dump_table_lms_events_raw") }}'
        columns:
          - name: raw_json
            description: '{{ doc("he_col_raw_lms_event_json") }}'
            data_tests:
              - not_null
          - name: __loaded_at
            description: '{{ doc("he_col__loaded_at")}}'
            data_tests:
              - not_null
