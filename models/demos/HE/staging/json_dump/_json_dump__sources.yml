version: 2

sources:
  - name: json_dump
    description: >
      Raw Higher Education data landed from S3 into Snowflake.
      JSON files are loaded into a VARIANT column and parsed in staging.
    database: HE_DEMO
    schema: RAW_JSON
    tables:
      - name: applications_raw
        description: >
          Raw admissions applications loaded from applications.json into a
          single VARIANT column for semi-structured parsing in staging.
        columns:
          - name: raw_json
            description: Full application JSON document stored as VARIANT
            data_tests:
              - not_null

      - name: lms_events_raw
        description: >
          Raw LMS clickstream events loaded from lms_events.json into a
          single VARIANT column for semi-structured parsing in staging.
        columns:
          - name: raw_json
            description: Full LMS event JSON document stored as VARIANT
            data_tests:
              - not_null
