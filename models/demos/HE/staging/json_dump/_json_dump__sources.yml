            description: '{{ doc("he_col_raw_application_json") }}'
            data_tests:
              - not_null

      - name: lms_events_raw
        description: '{{ doc("he_source_json_dump_table_lms_events_raw") }}'
        columns:
          - name: raw_json
            description: '{{ doc("he_col_raw_lms_event_json") }}'
            data_tests:
              - not_null
