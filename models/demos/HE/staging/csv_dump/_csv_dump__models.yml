version: 2

models:
  - name: stg_csv_dump__students
    description: >
      Staged student master data. One row per student. Adds fee_status derived field.
    columns:
      - name: student_id
        data_tests:
          - unique
          - not_null
      - name: full_name
        data_tests:
          - not_null
      - name: date_of_birth
        data_tests:
          - not_null
      - name: enrolment_status
        data_tests:
          - accepted_values:
              values: ["Active", "Interrupted", "Withdrawn", "Graduated"]
      - name: fee_status
        data_tests:
          - accepted_values:
              values: ["Home", "International"]

  - name: stg_csv_dump__course_enrolments
    description: >
      Staged course enrolments. One row per student-course-term.
      Adds grade_band classification and is_pass flag.
    columns:
      - name: enrolment_id
        data_tests:
          - unique
          - not_null
      - name: student_id
        data_tests:
          - not_null
      - name: course_code
        data_tests:
          - not_null
      - name: academic_term
        data_tests:
          - not_null
      - name: grade_band
        data_tests:
          - accepted_values:
              values:
                [
                  "Distinction",
                  "Merit",
                  "Pass",
                  "Near Pass",
                  "Fail",
                  "In Progress",
                  "Withdrawn",
                ]

  - name: stg_csv_dump__fee_charges
    description: >
      Staged fee charge ledger. One row per charge event.
      Adds payment_status derived classification.
    columns:
      - name: fee_id
        data_tests:
          - unique
          - not_null
      - name: student_id
        data_tests:
          - not_null
      - name: payment_status
        data_tests:
          - accepted_values:
              values: ["Fully Paid", "Partially Paid", "Unpaid"]
